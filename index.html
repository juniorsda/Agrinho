        <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz do Agrinho</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #e8f5e9; color: #2e7d32; text-align: center; padding: 20px; }
        .container { max-width: 600px; background: white; margin: 50px auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #1b5e20; }
        .btn-opcao { display: block; width: 100%; padding: 12px; margin: 10px 0; font-size: 18px; background-color: #a5d6a7; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; color: #1b5e20; font-weight: bold; }
        .btn-opcao:hover { background-color: #81c784; }
        #mensagem { font-size: 20px; font-weight: bold; margin-top: 20px; }
        #btn-proxima { margin-top: 20px; padding: 10px 25px; font-size: 16px; background-color: #1b5e20; color: white; border: none; border-radius: 5px; cursor: pointer; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Quiz do Agrinho 🌾🌱</h1>
    <hr>
    <h2 id="pergunta">Carregando pergunta...</h2>
    <div id="opcoes"></div>
    <div id="mensagem"></div>
    <button id="btn-proxima" onclick="proximaPergunta()">Próxima Pergunta</button>
</div>

<script>
    // COLOQUE SUAS PERGUNTAS AQUI DENTRO SEM CORTAR AS FRASES
    const perguntas = [
        {
            q: "No contexto de um agro forte e sustentável, qual das seguintes práticas promove simultaneamente o aumento da produtividade a longo prazo e a conservação do solo?",
            opcoes: ["Plantio direto e rotação de culturas.", "Aragem profunda e contínua associada ao monocultivo.", "Uso exclusivo de fertilizantes sintéticos sem análise prévia do solo."],
            correta: 1 
        },
        {
            q: "​Como a adoção de tecnologias de agricultura de precisão contribui para o equilíbrio entre economia e meio ambiente?",
            opcoes: ["Eliminando totalmente a necessidade de monitoramento humano no campo.", "Otimizando a aplicação de insumos de forma localizada, reduzindo desperdícios e custos.", "Padronizando a irrigação e a fertilização de forma idêntica para toda a propriedade."],
            correta: 2
        }
    ];

    let indiceAtual = 0;
    let pontuacao = 0;

    function carregarPergunta() {
        document.getElementById("mensagem").innerText = "";
        document.getElementById("btn-proxima").style.display = "none";
        
        let infoPergunta = perguntas[indiceAtual];
        document.getElementById("pergunta").innerText = infoPergunta.q;
        
        let containerOpcoes = document.getElementById("opcoes");
        containerOpcoes.innerHTML = "";

        infoPergunta.opcoes.forEach((opcao, index) => {
            let botao = document.createElement("button");
            botao.innerText = opcao;
            botao.className = "btn-opcao";
            botao.onclick = () => verificarResposta(index);
            containerOpcoes.appendChild(botao);
        });
    }

    function verificarResposta(indiceEscolhido) {
        let infoPergunta = perguntas[indiceAtual];
        let msg = document.getElementById("mensagem");
        
        let botoes = document.querySelectorAll(".btn-opcao");
        botoes.forEach(b => b.disabled = true);

        if (indiceEscolhido === infoPergunta.correta) {
            msg.innerText = "✅ Resposta Correta! Muito bem!";
            msg.style.color = "#2e7d32";
            pontuacao++;
        } else {
            msg.innerText = "❌ Resposta Errada!";
            msg.style.color = "#c62828";
        }

        document.getElementById("btn-proxima").style.display = "inline-block";
    }

    function proximaPergunta() {
        indiceAtual++;
        if (indiceAtual < perguntas.length) {
            carregarPergunta();
        } else {
            document.querySelector(".container").innerHTML = `
                <h1>Fim do Quiz! 🥳</h1>
                <p style="font-size: 22px;">Você acertou <strong>${pontuacao}</strong> de <strong>${perguntas.length}</strong> perguntas.</p>
                <button class="btn-opcao" onclick="location.reload()">Jogar Novamente</button>
            `;
        }
    }

    carregarPergunta();
</script>

</body>
</html>
