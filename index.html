<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz do Agrinho</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e8f5e9; /* Verde claro que lembra o campo */
            color: #2e7d32;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { color: #1b5e20; }
        .btn-opcao {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 18px;
            background-color: #a5d6a7;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: #1b5e20;
            font-weight: bold;
        }
        .btn-opcao:hover { background-color: #81c784; }
        #mensagem {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }
        #btn-proxima {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 16px;
            background-color: #1b5e20;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Quiz do Agrinho 🌾🌱</h1>
    <hr>
    <h2 id="pergunta">Carregando pergunta...</h2>
    <div id="opcoes"></div>
    <div id="mensagem"></div>
    <button id="btn-proxima" onclick="proximaPergunta()">Próxima Pergunta</button>
</div>

<script>
    // Lista de perguntas, opções e a resposta correta
    const perguntas = [
        {
            q: "Qual é o principal objetivo do programa Agrinho?",
            opcoes: ["Ensinar a jogar videogame", "Levar educação sobre sustentabilidade, saúde e cidadania", "Vender produtos do campo"],
            correta: 1
        },
        {
            q: "O que significa sustentabilidade no campo?",
            opcoes: ["Produzir alimentos protegendo a natureza para o futuro", "Gastar toda a água disponível", "Desmatar florestas para plantar mais"],
            correta: 0
        },
        {
            q: "Qual dessas atitudes ajuda a preservar a água nas fazendas?",
            opcoes: ["Deixar as torneiras abertas", "Proteger as nascentes dos rios e usar irrigação inteligente", "Jogar lixo perto dos rios"],
            correta: 1
        },
        {
            q: "O programa Agrinho é promovido por qual instituição?",
            opcoes: ["Uma loja de brinquedos", "SENAR (Serviço Nacional de Aprendizagem Rural)", "Uma empresa de internet"],
            correta: 1
        }
    ];

    let indiceAtual = 0;
    let pontuacao = 0;

    function carregarPergunta() {
        // Limpa mensagens e esconde o botão de próxima
        document.getElementById("mensagem").innerText = "";
        document.getElementById("btn-proxima").style.display = "none";
        
        let infoPergunta = perguntas[indiceAtual];
        document.getElementById("pergunta").innerText = infoPergunta.q;
        
        let containerOpcoes = document.getElementById("opcoes");
        containerOpcoes.innerHTML = ""; // Limpa os botões anteriores

        // Cria os botões para cada opção de resposta
        infoPergunta.opcoes.forEach((opcao, index) => {
            let botao = document.createElement("button");
            botao.innerText = opcao;
            botao.className = "btn-opcao";
            botao.onclick = () => verificarResposta(index);
            containerOpcoes.appendChild(botao);
        });
    }

    function verificarResposta(indiceEscolhido) {
        let infoPergunta = perguntas[indiceAtual];
        let msg = document.getElementById("mensagem");
        
        // Desativa os botões para o jogador não clicar de novo
        let botoes = document.querySelectorAll(".btn-opcao");
        botoes.forEach(b => b.disabled = true);

        if (indiceEscolhido === infoPergunta.correta) {
            msg.innerText = "✅ Resposta Correta! Muito bem!";
            msg.style.color = "#2e7d32";
            pontuacao++;
        } else {
            msg.innerText = "❌ Resposta Errada! A correta era: " + infoPergunta.opcoes[infoPergunta.correta];
            msg.style.color = "#c62828";
        }

        document.getElementById("btn-proxima").style.display = "inline-block";
    }

    function proximaPergunta() {
        indiceAtual++;
        if (indiceAtual < perguntas.length) {
            carregarPergunta();
        } else {

            document.getElementById("container").innerHTML =
